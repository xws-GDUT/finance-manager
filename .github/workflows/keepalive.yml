name: Render Keepalive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping finance-manager-api
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://finance-manager-0j5p.onrender.com/api/accounts)
          echo "API: HTTP $STATUS"

      - name: Ping finance-manager-web
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://finance-manager-web-o2hk.onrender.com)
          echo "Web: HTTP $STATUS"
